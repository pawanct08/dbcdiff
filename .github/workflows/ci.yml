name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (all supported Python versions) ────────────────────────────
  pytest:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

  # ── DBC semantic diff on pull requests ───────────────────────────────────
  dbc-diff:
    name: DBC semantic diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write   # post summary comment
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git show <base-ref>:<path> works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbcdiff
        run: pip install -e .

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      # Run the CI helper; capture its exit code (mirrors dbcdiff severity).
      # set +e keeps the script from aborting on non-zero exit;
      # $? is captured immediately after the Python call.
      - name: Diff changed DBC files
        id: diff
        run: |
          set +e
          python scripts/ci_dbc_diff.py \
            --base-ref origin/${{ github.base_ref }} \
            --report-dir /tmp/dbc-reports
          echo "max_severity=$?" >> "$GITHUB_OUTPUT"

      # Always upload HTML + JSON reports as a downloadable artifact
      - name: Upload diff reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbc-diff-reports
          path: /tmp/dbc-reports/
          if-no-files-found: ignore

      # Post the Markdown summary written by ci_dbc_diff.py as a PR comment
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '/tmp/dbc-reports/summary.md';
            if (!fs.existsSync(summaryPath)) { return; }
            const body = fs.readFileSync(summaryPath, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # Hard-block the merge if any BREAKING changes were detected
      - name: Block on BREAKING changes
        if: steps.diff.outputs.max_severity == '3'
        run: |
          echo "❌  BREAKING DBC changes detected — merge is blocked."
          echo "    Download the 'dbc-diff-reports' artifact to review details."
          exit 1
